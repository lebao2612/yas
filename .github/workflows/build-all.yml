# =====================================================================
# Build ALL services - tạo image baseline tag :main + :latest cho 11 service
# Chạy TAY (workflow_dispatch) - bấm "Run workflow" trên tab Actions.
# Dùng để có đủ image default cho Thành viên B deploy.
# Đặt file tại: .github/workflows/build-all.yml
# =====================================================================
name: Build ALL services (baseline main+latest)

on:
  workflow_dispatch: # chỉ chạy khi bấm tay

jobs:
  build-all:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # 1 service lỗi không hủy các service khác
      matrix:
        service:
          [
            product,
            media,
            customer,
            cart,
            tax,
            order,
            rating,
            location,
            inventory,
            promotion,
            payment,
          ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"
          cache: "maven"

      - name: Build jar with Maven (${{ matrix.service }})
        run: mvn -B clean install -pl ${{ matrix.service }} -am -DskipTests

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (main + latest)
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/yas-${{ matrix.service }}:main
            ${{ secrets.DOCKERHUB_USERNAME }}/yas-${{ matrix.service }}:latest

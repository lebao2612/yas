# =====================================================================
# CI Pipeline - Build & Push image lên Docker Hub
# Luồng: push code lên branch bất kỳ -> phát hiện service nào đổi
#        -> build jar (Maven) -> docker build -> push Docker Hub
# Tag:  branch main  -> :main và :latest
#       branch khác  -> :<commit-id 7 ký tự>
# Đặt file này tại: .github/workflows/ci.yml
# Cần GitHub Secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN
# =====================================================================
name: CI - Build & Push images

on:
  push:
    branches: ["**"] # mọi branch
  workflow_dispatch: # cho phép bấm chạy tay

jobs:
  # ---- Bước 1: phát hiện service nào có code thay đổi ----
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            tax: ['tax/**']
            product: ['product/**']
            media: ['media/**']
            customer: ['customer/**']
            cart: ['cart/**']
            order: ['order/**']
            rating: ['rating/**']
            location: ['location/**']
            inventory: ['inventory/**']
            promotion: ['promotion/**']
            payment: ['payment/**']

  # ---- Bước 2: build + push image cho từng service thay đổi ----
  build-and-push:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.services != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"
          cache: "maven"

      - name: Build jar with Maven (${{ matrix.service }})
        run: mvn -B clean install -pl ${{ matrix.service }} -am -DskipTests

      - name: Determine image tags
        id: meta
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/yas-${{ matrix.service }}"
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "tags=$IMAGE:main,$IMAGE:latest" >> "$GITHUB_OUTPUT"
          else
            echo "tags=$IMAGE:${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
